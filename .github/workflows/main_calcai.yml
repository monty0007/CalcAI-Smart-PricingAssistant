name: Build and deploy CalcAI backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install production dependencies
        working-directory: ./backend
        run: npm ci --omit=dev

      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../deploy.zip . \
            --exclude "*.log" \
            --exclude ".env" \
            --exclude "logs/*" \
            --exclude "tests/*" \
            --exclude "scripts/testing/*" \
            --exclude "scripts/debug/*" \
            --exclude "best_vm.json" \
            --exclude "db_output.json" \
            --exclude "debug_db_results.json" \
            --exclude "raw_data_out.json" \
            --exclude "test_out.json" \
            --exclude "test_out2.json" \
            --exclude "test_api_out.json"
          echo "Zip size: $(du -sh ../deploy.zip | cut -f1)"

      - name: Upload deployment zip
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment zip
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_69764139972F4CBEBC87396CB86DA479 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B39516F5B8434EA5A8E39C3F0B765E69 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B16CA8718B024FC8AD157234179135ED }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: calcai
          slot-name: Production
          package: deploy.zip


