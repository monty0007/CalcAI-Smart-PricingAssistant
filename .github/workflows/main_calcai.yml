name: Build and deploy CalcAI backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Validate dependencies (no install — Azure Oryx handles it)
        working-directory: ./backend
        run: node --input-type=module <<< "import fs from 'fs'; const p = JSON.parse(fs.readFileSync('package.json','utf8')); console.log('package.json OK — main:', p.main);"

      - name: Upload backend artifact (source only, no node_modules)
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: |
            backend
            !backend/node_modules/**
            !backend/.env
            !backend/logs/**
            !backend/tests/**
            !backend/scripts/testing/**
            !backend/scripts/debug/**
            !backend/*.log
            !backend/best_vm.json
            !backend/db_output.json
            !backend/debug_db_results.json
            !backend/raw_data_out.json
            !backend/test_out.json
            !backend/test_out2.json
            !backend/test_api_out.json

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_69764139972F4CBEBC87396CB86DA479 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B39516F5B8434EA5A8E39C3F0B765E69 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B16CA8718B024FC8AD157234179135ED }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: calcai
          slot-name: Production
          package: .


