name: Build and deploy CalcAI backend to Azure Web App
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../deploy.zip . \
            -x "node_modules/*" \
            -x ".env" \
            -x ".env.example" \
            -x ".gitignore" \
            -x "logs/*" \
            -x "*.log" \
            -x "tests/*" \
            -x "data/*" \
            -x "scripts/testing/*" \
            -x "scripts/debug/*" \
            -x "scripts/data/*" \
            -x "scripts/add_indexes.js" \
            -x "scripts/azure_pricing_dump.json" \
            -x "scripts/fetch_azure_prices.py" \
            -x "scripts/generate_vm_specs.py" \
            -x "scripts/initial_pricing_load.py" \
            -x "scripts/json_to_postgres.py" \
            -x "scripts/restore_vms.py" \
            -x "scripts/update_vm_types.py" \
            -x "src/cron.js" \
            -x "src/debug_internal.js" \
            -x "src/debug_robust.js" \
            -x "src/test_import.js" \
            -x "deploy.zip" \
            -x "*.json.bak" \
            -x "best_vm.json" \
            -x "db_output.json" \
            -x "debug_db_results.json" \
            -x "raw_data_out.json" \
            -x "test_out.json" \
            -x "test_out2.json" \
            -x "test_api_out.json" \
            -x "test_estimates.json" \
            -x "dupes_output.txt"
          ls -lh ../deploy.zip
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_69764139972F4CBEBC87396CB86DA479 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B39516F5B8434EA5A8E39C3F0B765E69 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B16CA8718B024FC8AD157234179135ED }}
      - name: Wait for SCM to be ready
        run: |
          echo "Waiting for Kudu SCM to be available..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://azure-pricing-calc-bjcnfxdahra9fhbv.scm.centralindia-01.azurewebsites.net)
            echo "Attempt $i: SCM status = $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "401" ]; then
              echo "SCM is ready!"
              break
            fi
            sleep 15
          done
      - name: Deploy via Azure CLI
        run: |
          az webapp deploy \
            --name azure-pricing-calc \
            --resource-group calcAI-pricingcalculator \
            --src-path deploy.zip \
            --type zip \
            --async false
      - name: Configure startup command
        run: |
          az webapp config set \
            --name azure-pricing-calc \
            --resource-group calcAI-pricingcalculator \
            --startup-file "node src/index.js"
      - name: Verify deployment
        run: |
          echo "Waiting 90s for app to start (Oryx building deps on server)..."
          sleep 90
          for i in {1..5}; do
            if curl -sf https://azure-pricing-calc-bjcnfxdahra9fhbv.centralindia-01.azurewebsites.net/api/health; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 20s..."
            sleep 20
          done
          echo "⚠️ Health check failed — check App Service logs"
