name: Build and deploy CalcAI backend to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/main_azure-pricing-backend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install production dependencies
        working-directory: ./backend
        run: npm ci --omit=dev

      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../deploy.zip . \
            -x "*.log" \
            -x ".env" \
            -x "logs/*" \
            -x "tests/*" \
            -x "scripts/testing/*" \
            -x "scripts/debug/*"
          ls -lh ../deploy.zip

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1521E9884CB5456EBA02A070F24EA6B8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9F53C249A8D7428EB3B23A9DBE9BBEEB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_57ACE6578C7B4DE6BB180291C06304A5 }}

      - name: Deploy via Azure CLI
        run: |
          az webapp deploy \
            --name azure-pricing-backend \
            --resource-group calcAI-pricingcalculator \
            --src-path deploy.zip \
            --type zip \
            --async false

      - name: Configure startup command
        run: |
          az webapp config set \
            --name azure-pricing-backend \
            --resource-group calcAI-pricingcalculator \
            --startup-file "node src/index.js"
