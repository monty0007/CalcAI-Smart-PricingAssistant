name: Build and deploy CalcAI backend to Azure Web App
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      - name: Install production dependencies
        working-directory: ./backend
        run: npm ci --omit=dev
      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../deploy.zip . \
            -x "node_modules/.cache/*" \
            -x "*.log" \
            -x ".env" \
            -x "logs/*" \
            -x "tests/*" \
            -x "scripts/testing/*" \
            -x "scripts/debug/*" \
            -x "best_vm.json" \
            -x "db_output.json" \
            -x "debug_db_results.json" \
            -x "raw_data_out.json" \
            -x "test_out.json" \
            -x "test_out2.json" \
            -x "test_api_out.json"
          ls -lh ../deploy.zip
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_69764139972F4CBEBC87396CB86DA479 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B39516F5B8434EA5A8E39C3F0B765E69 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B16CA8718B024FC8AD157234179135ED }}
      - name: Wait for SCM to be ready
        run: |
          echo "Waiting for Kudu SCM to be available..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://calcai-bmcdephkb6bydzgf.scm.centralindia-01.azurewebsites.net)
            echo "Attempt $i: SCM status = $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "401" ]; then
              echo "SCM is ready!"
              break
            fi
            sleep 15
          done
      - name: Deploy via Azure CLI
        run: |
          az webapp deploy \
            --name calcai \
            --resource-group calcAI-pricingcalculator \
            --src-path deploy.zip \
            --type zip \
            --async false
      - name: Configure startup command
        run: |
          az webapp config set \
            --name calcai \
            --resource-group calcAI-pricingcalculator \
            --startup-file "node src/index.js"
      - name: Verify deployment
        run: |
          echo "Waiting 40s for app to start..."
          sleep 40
          curl -sf https://calcai-bmcdephkb6bydzgf.centralindia-01.azurewebsites.net/api/health || echo "⚠️ Health check failed — check App Service logs"

